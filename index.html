<!DOCTYPE html>
<html lang="ar" dir="rtl" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YakZone</title>
  <link rel="icon" type="image/png" href="cropped_circle_image.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">

<div class="app-container">
    <div class="header">
        <div class="logo">Yak<span style="color: var(--primary);"> Zone</span></div>
        <button class="settings-btn" onclick="toggleSettings()" aria-label="Settings">
            <i class="fas fa-cog"></i>
        </button>
    </div>

    <div class="main-card">
        <div class="input-box">
            <label id="lblAmount">المبلغ</label>
            <input type="number" id="amount" value="1000" oninput="convert()" inputmode="decimal">
        </div>

        <div class="currency-grid">
            <div class="select-group">
                <label id="lblFrom">من</label>
                <select id="fromCurrency" onchange="convert()"></select>
            </div>

            <div class="swap-container">
                <button class="swap-button" onclick="swapCurrencies()" title="تبديل العملات">
                    <i class="fas fa-exchange-alt"></i>
                </button>
            </div>
<div class="search-box">
    <input type="text" id="currencySearch" placeholder="ابحث عن عملة... (مثلاً: USD)" onkeyup="filterCurrencies()">
</div>
            <div class="select-group">
                <label id="lblTo">إلى</label>
                <select id="toCurrency" onchange="convert()"></select>
            </div>
        </div>

        <div class="result-area">
            <p id="rateInfo">---</p>
            <h2 id="finalResult" title="اضغط للنسخ">0.00</h2>
            <small id="copyHint" style="opacity: 0.5; font-size: 10px; display: block; margin-top: 5px; color: var(--primary);">اضغط على المبلغ للنسخ السريع</small>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h3 id="setTile">الإعدادات</h3>
            <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px;">
            
            <div class="set-item">
                <span id="setLang">اللغة:</span>
                <select id="langSelect" onchange="changeLanguage()">
                    <option value="ar">العربية</option>
                    <option value="en">English</option>
                    <option value="fr">Français</option>
                </select>
            </div>
            <div class="set-item">
    <span id="setCustomColor">لون التطبيق:</span>
    <input type="color" id="colorPicker" value="#a855f7" onchange="updateAppColor(this.value)" style="width: 50px; height: 30px; padding: 0; border-radius: 5px; cursor: pointer;">
</div>

            <div class="set-item">
                <span id="setTheme">المظهر:</span>
                <button class="theme-btn" onclick="toggleTheme()">
                    <i class="fas fa-moon"></i> / <i class="fas fa-sun"></i>
                </button>
            </div>

            <button class="close-btn" onclick="toggleSettings()">إغلاق</button>
        </div>
    </div>
</div>


<script src="script.js"></script>
</body>
</html>
